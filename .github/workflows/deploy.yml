# Auto-deploy to Cloudflare on every push to main (no manual `wrangler deploy`).
# Needs two repo secrets: CLOUDFLARE_API_TOKEN (Workers deploy scope) and
# CLOUDFLARE_ACCOUNT_ID. The Worker's own secret (SPRITEDX_API_KEY) is set
# out-of-band via `wrangler secret put` / the dashboard and persists across deploys.
name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
